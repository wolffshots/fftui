name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create the release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build artifacts
        env:
          VERSION: ${{ github.ref_name }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          ldflags="-s -w -X main.version=${VERSION}"
          build() {
            out="dist/fftui_${VERSION}_$1_$2$3"
            GOOS="$1" GOARCH="$2" go build -trimpath -ldflags "$ldflags" -o "$out" .
            echo "built $out"
          }
          build linux   amd64 ""
          build windows  amd64 ".exe"
          build darwin  arm64 ""
          (cd dist && sha256sum fftui_* > checksums.txt)
          ls -l dist

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "fftui ${{ github.ref_name }}" \
            --generate-notes \
            dist/*
